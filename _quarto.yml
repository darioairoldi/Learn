format:
  html:
    theme: 
      - cerulean
      - cerulean.scss
    css: 
      - styles.css
    include-after-body: 
      - _includes/right-nav.html
    toc: true
    toc-depth: 3
    toc-location: right
    number-sections: false
    anchor-sections: true
    smooth-scroll: true
    code-fold: false
    code-tools: true
    code-copy: true
    highlight-style: github
    fig-width: 8
    fig-height: 6
    fig-cap-location: bottom
    callout-appearance: default
    citations-hover: true
    footnotes-hover: true
    crossref:
      fig-title: "Figure"
      tbl-title: "Table"
      eq-title: "Equation"
    date-format: "MMMM D, YYYY"
    lang: en
    page-layout: article
    toc-title: "On This Page"
    title-block-banner: false
    title-block-style: default
    grid:
      sidebar-width: 300px
      body-width: 900px
      margin-width: 280px
    html-table-processing: none
    html-math-method: katex
    strip-comments: false
    link-external-newwindow: true
    link-external-icon: true
    embed-resources: false
    html-q-tags: true
    from: markdown+emoji+tex_math_dollars+fenced_divs+bracketed_spans+pipe_tables+grid_tables+simple_tables+multiline_tables
    fig-responsive: true
    lightbox: true
    smart: true
    preserve-tabs: true
