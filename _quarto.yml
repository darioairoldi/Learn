format:
  html:
    theme: 
      - cerulean
      - cerulean.scss
    css: 
      - styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    number-sections: false
    anchor-sections: true
    smooth-scroll: true
    code-fold: false
    code-tools: true
    code-copy: true
    highlight-style: github
    fig-width: 8
    fig-height: 6
    fig-cap-location: bottom
    callout-appearance: default
    citations-hover: true
    footnotes-hover: true
    crossref:
      fig-title: "Figure"
      tbl-title: "Table"
      eq-title: "Equation"
    date-format: "MMMM D, YYYY"
    lang: en
    page-layout: article
    grid:
      sidebar-width: 300px
      body-width: 900px
      margin-width: 200px
    # Enhanced markdown rendering
    html-table-processing: none
    html-math-method: katex
    strip-comments: false
    link-external-newwindow: true
    link-external-icon: true
    embed-resources: false
    html-q-tags: true
    # Better markdown support
    from: markdown+emoji+tex_math_dollars+fenced_divs+bracketed_spans+pipe_tables+grid_tables+simple_tables+multiline_tables
    # Image processing
    fig-responsive: true
    lightbox: true
    # Enhanced text processing
    smart: true
    preserve-tabs: true

execute:
  cache: true
  freeze: auto
  echo: true
  warning: false
  error: false

metadata:
  author: "Dario Airoldi"
  date: last-modified
  description: "Technical learning notes, conference insights, and development guides"
  keywords:
    - learning
    - development
    - azure
    - dotnet
    - conference
    - documentation
  image: "images/logo.png"  # Add if you have a logo

language:
  title-block-banner: true
  search-box-placeholder: "Search documentation..."
  search-more-text: "More matches"
  search-clear-button-title: "Clear search"
